name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate before publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync versions from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          python scripts/sync_version.py --version "${TAG_VERSION}"

      - name: Install test dependencies
        run: uv sync --extra test

      - name: Verify tag, pyproject, and package versions match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PACKAGE_VERSION=$(python -c "import videocompress; print(videocompress.__version__)")
          echo "Tag: ${TAG_VERSION}"
          echo "pyproject: ${PYPROJECT_VERSION}"
          echo "package: ${PACKAGE_VERSION}"
          test "${PYPROJECT_VERSION}" = "${TAG_VERSION}"
          test "${PACKAGE_VERSION}" = "${TAG_VERSION}"

      - name: Lint
        run: uvx ruff check videocompress tests

      - name: Run fast tests
        run: uv run pytest -q -m "not integration"

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync versions from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          python scripts/sync_version.py --version "${TAG_VERSION}"

      - name: Build package
        run: uv build

      - name: Verify package metadata
        run: uvx twine check dist/*

      - name: Show built artifacts
        run: ls -lah dist

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to pypi.org
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
          print-hash: true
